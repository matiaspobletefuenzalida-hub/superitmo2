<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Ritmo 7.2 - Prof. Matías Poblete</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vexflow@4.2.2/build/cjs/vexflow.js"></script>
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #049CD8;
            --mario-green: #43B047;
            --mario-yellow: #FBD000;
            --border-dark: #111;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-image: radial-gradient(rgba(255,255,255,0.3) 10%, transparent 11%), radial-gradient(rgba(255,255,255,0.3) 10%, transparent 11%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* FONDOS DINÁMICOS */
        .bg-level-1 { background-color: #5CB8FF; } /* Cielo */
        .bg-level-2 { background-color: #FF9E2C; } /* Atardecer */
        .bg-level-3 { background-color: #4A154B; } /* Castillo/Noche */

        .app-container {
            background: #ffffff;
            padding: 1.5rem 1rem;
            border-radius: 16px;
            border: 5px solid var(--border-dark);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 1000px;
            text-align: center;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        h1 { 
            font-family: 'Press Start 2P', cursive; 
            font-size: 1.5rem; 
            color: var(--mario-red); 
            text-shadow: 3px 3px 0px var(--border-dark), -2px -2px 0px #fff; 
            margin-top: 5px; margin-bottom: 5px; line-height: 1.4;
        }
        .subtitle { color: #555; font-weight: 900; margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase; }

        /* --- PANTALLA LOGIN --- */
        #login-section { padding: 30px 15px; background: #f4f4f4; border-radius: 12px; border: 4px dashed #ccc; margin-top: 10px; }
        input[type="text"] { 
            font-size: 1.2rem; padding: 12px; border-radius: 8px; border: 4px solid var(--border-dark); 
            width: 90%; max-width: 300px; text-align: center; margin-bottom: 15px; outline: none; font-family: 'Fredoka';
        }

        /* --- HUD --- */
        .hud-container {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--border-dark); color: white; padding: 10px 15px;
            border-radius: 12px; margin-bottom: 15px; box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            flex-wrap: wrap; gap: 8px;
        }
        .hud-item { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 5px; }
        .hud-level { color: var(--mario-green); font-family: 'Press Start 2P', cursive; font-size: 0.7rem; }
        .coin-display { color: var(--mario-yellow); font-family: 'Press Start 2P', cursive; font-size: 1rem; text-shadow: 2px 2px 0 #000; position: relative;}
        
        .progress-wrapper { width: 100%; min-width: 120px; max-width: 200px; background: #333; border-radius: 8px; height: 18px; border: 2px solid #fff; overflow: hidden; position: relative;}
        .progress-bar { height: 100%; background: var(--mario-yellow); width: 0%; transition: width 0.4s ease; border-right: 2px solid #fff; }

        /* --- DICCIONARIO INTELIGENTE --- */
        .instructions-panel {
            display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 10px; margin-bottom: 15px;
            background: #E8F6FF; padding: 10px; border-radius: 12px; border: 4px solid var(--mario-blue);
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .instructions-panel::-webkit-scrollbar { display: none; }
        .card { 
            background: #fff; padding: 5px; border-radius: 8px; border: 3px solid var(--border-dark); 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.2); flex: 0 0 auto; width: 100px; height: 125px;
        }
        .mini-canvas { width: 90px; height: 75px; }
        .card b { color: var(--mario-red); font-size: 0.95rem; margin-top: -5px; font-weight: 900; line-height: 1.1; text-align: center;}
        .card small { color: #666; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; margin-bottom: 2px;}
        .txt-blanca { font-size: 0.75rem !important; color: #E52521; }

        /* --- BOTONES --- */
        .btn-main {
            padding: 12px 15px; font-size: 1rem; border-radius: 8px; border: 4px solid var(--border-dark);
            color: white; cursor: pointer; box-shadow: 0 6px 0 var(--border-dark); font-family: 'Fredoka'; font-weight: 900;
            text-transform: uppercase; transition: all 0.1s; margin: 5px 2px; flex: 1; min-width: 130px;
        }
        .btn-main:active { transform: translateY(6px); box-shadow: 0 0px 0 var(--border-dark); }
        .btn-start { background: var(--mario-blue); font-size: 1.2rem; }
        .btn-success { background: var(--mario-green); font-size: 1.1rem; }
        .btn-skip { background: #FF9800; color: #fff; }
        .btn-metro { background: #9C27B0; color: #fff; flex: 0.5; min-width: 60px; }
        .btn-print { background: #607D8B; color: #fff; flex: 0.5; min-width: 60px; }
        .button-group { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; width: 100%; }

        /* --- CONTENEDOR VEXFLOW MEJORADO (RESPONSIVE) --- */
        #score-wrapper {
            width: 100%; border: 4px solid var(--border-dark); border-radius: 12px;
            background: #fff; margin-bottom: 15px; box-shadow: inset 3px 3px 8px rgba(0,0,0,0.1);
            overflow: hidden; /* Elimina la barra de desplazamiento */
            padding: 15px 0;
            box-sizing: border-box;
        }
        #score-container { 
            width: 100%; display: flex; justify-content: center; 
        }
        /* Esto hace que el SVG generado por VexFlow se adapte al contenedor padre */
        #score-container svg {
            max-width: 100%; 
            height: auto; 
            display: block;
        }

        #game-content, #victory-modal { display: none; }

        /* --- MODAL VICTORIA --- */
        #victory-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 100; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: #fff; padding: 30px 20px; border-radius: 16px; text-align: center; 
            border: 6px solid var(--border-dark); box-shadow: 10px 10px 0px #000; max-width: 400px; width: 100%;
        }
        .modal-content h2 { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; color: var(--border-dark); margin: 15px 0; line-height: 1.5;}
        .modal-content p { font-size: 1.1rem; font-weight: bold; color: #111; background: #eee; padding: 10px; border-radius: 8px; border: 3px dashed #ccc;}

        /* --- MODAL ARCADE --- */
        #pausa-activa-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; padding: 10px; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        .arcade-cabinet {
            background: #2c3e50; padding: 20px; border-radius: 20px; border: 6px solid #000;
            box-shadow: 10px 10px 0px #FBD000, inset 0 0 20px rgba(0,0,0,0.5);
            max-width: 400px; width: 100%; display: flex; flex-direction: column; align-items: center;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Press Start 2P', cursive;
        }
        .arcade-title { font-size: 1rem; color: #fff; margin-bottom: 10px; text-shadow: 2px 2px 0 #000; text-align: center; }
        .arcade-screen {
            background: #87CEEB; width: 100%; max-width: 300px; height: 300px; border: 8px solid #000;
            border-radius: 10px; position: relative; overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.4);
            image-rendering: pixelated;
        }
        #gameCanvas { display: block; width: 100%; height: 100%; }
        
        .arcade-controls {
            display: flex; justify-content: space-between; width: 100%; max-width: 300px; margin-top: 20px;
        }
        .d-pad { display: grid; grid-template-columns: repeat(3, 40px); grid-template-rows: repeat(3, 40px); gap: 5px; }
        .d-btn { background: #E52521; border: 3px solid #000; border-radius: 10px; font-size: 1.2rem; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #000; transition: transform 0.1s; font-family: sans-serif; padding: 0;}
        .d-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #000; }
        .d-up { grid-column: 2; grid-row: 1; } .d-left { grid-column: 1; grid-row: 2; } .d-right { grid-column: 3; grid-row: 2; } .d-down { grid-column: 2; grid-row: 3; }
        
        .action-pad { display: flex; align-items: center; justify-content: center; }
        .a-btn { background: #FBD000; border: 3px solid #000; width: 60px; height: 60px; border-radius: 50%; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #000; transition: transform 0.1s; font-size: 0.6rem; display: flex; align-items: center; justify-content: center; text-shadow: none; color: #000;}
        .a-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #000; }
        #btn-cerrar-pausa { margin-top: 15px; width: 100%; }

        /* --- ANIMACIONES --- */
        .floating-text {
            position: absolute; color: var(--mario-yellow); font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem; text-shadow: 2px 2px 0px #000; pointer-events: none; z-index: 1000;
            animation: floatUp 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* --- MODO IMPRESIÓN --- */
        @media print {
            body { background: none; padding: 0; margin: 0; }
            .app-container { border: none; box-shadow: none; padding: 0; max-width: 100%; }
            .hud-container, #login-section, .button-group, .instructions-panel, .subtitle { display: none !important; }
            h1 { color: #000; text-shadow: none; font-size: 1.2rem; text-align: left; margin-bottom: 20px; }
            #score-wrapper { border: none; box-shadow: none; overflow: visible; padding: 0; }
            #score-container { min-width: 100%; padding: 0; }
        }

        @media (min-width: 600px) {
            h1 { font-size: 2.2rem; }
            .btn-main { font-size: 1.2rem; padding: 12px 24px; }
            .instructions-panel { flex-wrap: wrap; justify-content: center; overflow-x: visible; }
            .card { width: 110px; height: 130px; padding: 8px; }
        }
    </style>
</head>
<body class="bg-level-1" id="body-bg">

<div class="app-container">
    <h1>SUPER RITMO</h1>
    <div class="subtitle">Entrenamiento Musical - Prof. Matías Poblete</div>

    <div id="login-section">
        <h2 style="color: var(--border-dark); font-size: 1.3rem;">INSERTA TU NOMBRE (COIN)</h2>
        <input type="text" id="student-name" placeholder="Tu nombre...">
        <br>
        <button class="btn-main btn-start" onclick="handleLogin()">START!</button>
    </div>

    <div id="game-content">
        <div class="hud-container">
            <div class="hud-item">👤 <span id="display-name">Jugador</span></div>
            <div class="hud-item hud-level">MUNDO <span id="display-level">1</span></div>
            <div class="hud-item" style="flex-direction: column; gap: 4px;">
                <div class="progress-wrapper"><div class="progress-bar" id="coin-progress"></div></div>
            </div>
            <div class="hud-item coin-display" id="coin-ui"><span id="display-coins">0</span>/50 🪙</div>
        </div>

        <div class="instructions-panel" id="dict-panel">
            <div class="card" id="c-h"><div id="m-h" class="mini-canvas"></div><small>Blanca</small><b class="txt-blanca">Aplauso<br>y giro</b></div>
            <div class="card" id="c-q"><div id="m-q" class="mini-canvas"></div><small>Negra</small><b>Pan</b></div>
            <div class="card" id="c-28"><div id="m-28" class="mini-canvas"></div><small>Doble Corchea</small><b>ca-sa</b></div>
            <div class="card" id="c-416"><div id="m-416" class="mini-canvas"></div><small>Cuartina</small><b>Ra-pi-di-to</b></div>
            <div class="card" id="c-sin"><div id="m-sin" class="mini-canvas"></div><small>Síncopa</small><b>Sin-co-pa</b></div>
            <div class="card" id="c-sal"><div id="m-sal" class="mini-canvas"></div><small>Saltillo</small><b>Sal-to</b></div>
        </div>

        <div id="score-wrapper">
            <div id="score-container"></div>
        </div>
        
        <div class="button-group">
            <button class="btn-main btn-metro" onclick="playMetronome()">⏱️</button>
            <button class="btn-main btn-print" onclick="window.print()">🖨️</button>
            <button class="btn-main btn-skip" onclick="generateExercise()">⏭️ SALTAR</button>
            <button class="btn-main btn-success" onclick="winCoins(event)">🍄 ¡BIEN! (+10)</button>
        </div>
    </div>
</div>

<div id="victory-modal">
    <div class="modal-content">
        <h1 style="font-size: 4rem; margin: 0; text-shadow: none;">⭐</h1>
        <h2>¡MUNDO COMPLETADO!</h2>
        <p id="victory-text">¡Lograste 50 monedas!</p>
        <button class="btn-main btn-success" style="margin-top: 15px; width: 100%;" onclick="nextLevel()">SIGUIENTE MUNDO 🚀</button>
    </div>
</div>

<div id="pausa-activa-modal">
    <div class="arcade-cabinet">
        <h2 class="arcade-title" id="arcade-title">CARGANDO...</h2>
        <div class="arcade-screen">
            <canvas id="gameCanvas" width="300" height="300"></canvas>
        </div>
        <div class="arcade-controls" id="arcade-controls">
            <div class="d-pad">
                <button class="d-btn d-up" onmousedown="pressKey('ArrowUp')" onmouseup="releaseKey('ArrowUp')" ontouchstart="pressKey('ArrowUp')" ontouchend="releaseKey('ArrowUp')">▲</button>
                <button class="d-btn d-left" onmousedown="pressKey('ArrowLeft')" onmouseup="releaseKey('ArrowLeft')" ontouchstart="pressKey('ArrowLeft')" ontouchend="releaseKey('ArrowLeft')">◀</button>
                <button class="d-btn d-right" onmousedown="pressKey('ArrowRight')" onmouseup="releaseKey('ArrowRight')" ontouchstart="pressKey('ArrowRight')" ontouchend="releaseKey('ArrowRight')">▶</button>
                <button class="d-btn d-down" onmousedown="pressKey('ArrowDown')" onmouseup="releaseKey('ArrowDown')" ontouchstart="pressKey('ArrowDown')" ontouchend="releaseKey('ArrowDown')">▼</button>
            </div>
            <div class="action-pad">
                <button class="a-btn" onmousedown="pressKey(' ')" onmouseup="releaseKey(' ')" ontouchstart="pressKey(' ')" ontouchend="releaseKey(' ')">SALTAR</button>
            </div>
        </div>
        <button id="btn-cerrar-pausa" class="btn-main" style="background-color: #43B047; display: none;" onclick="cerrarArcade()">¡Volver!</button>
    </div>
</div>

<script>
    const { Renderer, Stave, StaveNote, Formatter, Beam, Dot, Barline } = Vex.Flow;
    
    let currentDifficulty = 1;
    let playerName = "";
    let coins = 0;
    let totalAciertos = 0;
    const GOAL_COINS = 50;

    // --- SISTEMA DE AUDIO (SFX) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration, vol=0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function playCoinSound() {
        playTone(987.77, 'sine', 0.1); 
        setTimeout(() => playTone(1318.51, 'sine', 0.3), 100); 
    }

    function playLevelUpSound() {
        const notes = [329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; 
        notes.forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.15, 0.05), i * 120));
    }

    function playMetronome() {
        for(let i=0; i<4; i++) {
            setTimeout(() => playTone(i===0 ? 800 : 400, 'triangle', 0.1, 0.2), i * 600);
        }
    }

    // --- LÓGICA DEL JUEGO ---
    function handleLogin() {
        const nameInput = document.getElementById('student-name').value.trim();
        if(nameInput.length < 2) { alert("¡Ingresa tu nombre para comenzar!"); return; }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        playerName = nameInput;
        document.getElementById('display-name').innerText = playerName;
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('game-content').style.display = 'block';

        fetch("https://formsubmit.co/ajax/matias.poblete@slepcolchagua.cl", {
            method: "POST",
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                Asunto: `🚀 Asistencia: ¡${playerName} ha ingresado a Super Ritmo!`,
                Alumno: playerName,
                Accion: "Ingreso al juego",
                Fecha_Hora: new Date().toLocaleString(),
                Mensaje: `El estudiante ${playerName} acaba de iniciar sesión en la aplicación para practicar.`
            })
        }).catch(error => console.log("Aviso: Error al enviar aviso de ingreso."));
        
        drawDictionary();
        updateUIForLevel();
        generateExercise();
    }

    function winCoins(e) {
        coins += 10;
        totalAciertos++;
        playCoinSound();
        createFloatingText(e.clientX, e.clientY);
        updateHUD();

        // Activador de minijuegos cada 5 aciertos
        if (totalAciertos % 5 === 0) {
            iniciarArcade();
        } else {
            if (coins >= GOAL_COINS) setTimeout(triggerLevelUp, 300);
            else generateExercise();
        }
    }

    function createFloatingText(x, y) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = '+10';
        el.style.left = (x - 20) + 'px';
        el.style.top = (y - 30) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    function updateHUD() {
        document.getElementById('display-coins').innerText = coins;
        document.getElementById('display-level').innerText = currentDifficulty;
        let progress = Math.min((coins / GOAL_COINS) * 100, 100);
        document.getElementById('coin-progress').style.width = progress + "%";
    }

    function triggerLevelUp() {
        playLevelUpSound();
        document.getElementById('victory-modal').style.display = 'flex';
        
        if (currentDifficulty >= 3) {
            document.getElementById('victory-text').innerText = "¡ERES UN MAESTRO DEL RITMO! Has completado todos los mundos.";
            document.querySelector('#victory-modal .btn-success').innerText = "VOLVER A JUGAR";
        } else {
            document.getElementById('victory-text').innerText = `¡Lograste ${GOAL_COINS} monedas! Prepárate para el Mundo ${currentDifficulty + 1}.`;
        }

        fetch("https://formsubmit.co/ajax/matias.poblete@slepcolchagua.cl", {
            method: "POST",
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                Asunto: `🍄 Avance: ¡${playerName} superó el Mundo ${currentDifficulty}!`,
                Alumno: playerName,
                Mundo_Superado: currentDifficulty,
                Monedas: GOAL_COINS,
                Fecha_Hora: new Date().toLocaleString(),
                Mensaje: `El estudiante ${playerName} completó la recolección de monedas en el Mundo ${currentDifficulty}.`
            })
        }).catch(error => console.log("Aviso: Error de red al enviar notificación."));
    }

    function nextLevel() {
        document.getElementById('victory-modal').style.display = 'none';
        if (currentDifficulty < 3) currentDifficulty++;
        else currentDifficulty = 1; 
        
        coins = 0;
        updateHUD();
        updateUIForLevel();
        generateExercise();
    }

    function updateUIForLevel() {
        const body = document.getElementById('body-bg');
        body.className = `bg-level-${currentDifficulty}`;

        document.getElementById('c-h').style.display = 'flex';
        document.getElementById('c-q').style.display = 'flex';
        document.getElementById('c-28').style.display = 'flex';
        
        document.getElementById('c-416').style.display = currentDifficulty >= 2 ? 'flex' : 'none';
        
        document.getElementById('c-sin').style.display = currentDifficulty >= 3 ? 'flex' : 'none';
        document.getElementById('c-sal').style.display = currentDifficulty >= 3 ? 'flex' : 'none';
    }

    // --- VEXFLOW ---
    function drawMini(id, notesData, hasBeam = true) {
        const div = document.getElementById(id);
        if(!div) return;
        div.innerHTML = "";
        const renderer = new Renderer(div, Renderer.Backends.SVG);
        renderer.resize(90, 75); 
        const context = renderer.getContext();
        context.scale(0.8, 0.8);
        const stave = new Stave(5, -5, 100); 
        stave.setBegBarType(Barline.type.NONE).setEndBarType(Barline.type.NONE);
        stave.getConfigForLines().forEach(l => l.visible = false);
        stave.setContext(context).draw();

        const notes = notesData.map(d => {
            const sn = new StaveNote({ keys: ["b/4"], duration: d.dur, stem_direction: 1 });
            if(d.dot) Dot.buildAndAttach([sn], { all: true });
            return sn;
        });

        if(hasBeam && notes.length > 1) {
            const beam = new Beam(notes);
            Formatter.FormatAndDraw(context, stave, notes);
            beam.setContext(context).draw();
        } else {
            Formatter.FormatAndDraw(context, stave, notes);
        }
    }

    function drawDictionary() {
        drawMini('m-h', [{dur: 'h'}], false);
        drawMini('m-q', [{dur: 'q'}], false);
        drawMini('m-28', [{dur: '8'}, {dur: '8'}]);
        drawMini('m-416', [{dur: '16'}, {dur: '16'}, {dur: '16'}, {dur: '16'}]);
        drawMini('m-sin', [{dur: '16'}, {dur: '8'}, {dur: '16'}]);
        drawMini('m-sal', [{dur: '8d', dot: true}, {dur: '16'}]);
    }

    const poolBasico = [
        { key: 'h', beats: 2, create: () => [new StaveNote({ keys: ["b/4"], duration: "h", stem_direction: 1 })] },
        { key: 'q', beats: 1, create: () => [new StaveNote({ keys: ["b/4"], duration: "q", stem_direction: 1 })] },
        { key: 'qr', beats: 1, create: () => [new StaveNote({ keys: ["b/4"], duration: "qr" })] },
        { key: 'hr', beats: 2, create: () => [new StaveNote({ keys: ["b/4"], duration: "hr" })] }  
    ];

    const todasAgrupaciones = {
        'double': { beats: 1, create: () => [new StaveNote({ keys: ["b/4"], duration: "8", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "8", stem_direction: 1 })] },
        'cuartina': { beats: 1, create: () => [new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 })] },
        'sincopa': { beats: 1, create: () => [new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "8", stem_direction: 1 }), new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 })] },
        'saltillo': { beats: 1, create: () => {
            const n = new StaveNote({ keys: ["b/4"], duration: "8d", stem_direction: 1 });
            Dot.buildAndAttach([n], { reflection: 1 });
            return [n, new StaveNote({ keys: ["b/4"], duration: "16", stem_direction: 1 })];
        }}
    };

    function getPoolForLevel() {
        let pool = [todasAgrupaciones['double']];
        if (currentDifficulty >= 2) { pool.push(todasAgrupaciones['cuartina']); }
        if (currentDifficulty >= 3) { pool.push(todasAgrupaciones['sincopa'], todasAgrupaciones['saltillo']); }
        return pool;
    }

    function generateExercise() {
        const container = document.getElementById("score-container");
        container.innerHTML = "";
        const renderer = new Renderer(container, Renderer.Backends.SVG);
        const context = renderer.getContext();
        
        // Configuramos un lienzo fijo interno para que Vexflow lo dibuje bien
        const totalWidth = 900;
        const totalHeight = 140;
        renderer.resize(totalWidth, totalHeight);

        const numMeasures = 4;
        const measureWidth = totalWidth / numMeasures; 

        const activePoolAgrup = getPoolForLevel();
        let totalGroupingsTarget = currentDifficulty === 1 ? 1 : (currentDifficulty === 2 ? 3 : 5); 

        let groupingsPerMeasure = [0, 0, 0, 0];
        for(let i = 0; i < totalGroupingsTarget; i++) {
            let rndMeasure = Math.floor(Math.random() * 4);
            if(groupingsPerMeasure[rndMeasure] < 4) groupingsPerMeasure[rndMeasure]++;
            else i--; 
        }

        let tipoRepeticion = Math.floor(Math.random() * 3); 

        let x = 0;
        for (let m = 0; m < numMeasures; m++) {
            // Se le resta un poco de espacio para el padding visual
            const stave = new Stave(x, 10, measureWidth - 5); 
            
            if (m === 0) {
                stave.addTimeSignature("4/4");
                if (tipoRepeticion === 1 || tipoRepeticion === 2) stave.setBegBarType(Barline.type.REPEAT_BEGIN);
                if (tipoRepeticion === 1) stave.setEndBarType(Barline.type.REPEAT_END);
            }
            if (m === numMeasures - 1) {
                if (tipoRepeticion === 2) stave.setEndBarType(Barline.type.REPEAT_END);
                else stave.setEndBarType(Barline.type.END);
            }
            
            stave.getConfigForLines().forEach((l, i) => l.visible = i === 2);
            stave.setContext(context).draw();

            let measureItems = [];
            let currentBeats = 0;

            for(let i=0; i < groupingsPerMeasure[m]; i++) {
                const group = activePoolAgrup[Math.floor(Math.random() * activePoolAgrup.length)];
                measureItems.push({ data: group });
                currentBeats += group.beats;
            }

            while(currentBeats < 4) {
                let validBasics = poolBasico.filter(b => b.beats <= (4 - currentBeats));
                const basic = validBasics[Math.floor(Math.random() * validBasics.length)];
                measureItems.push({ data: basic });
                currentBeats += basic.beats;
            }

            measureItems.sort(() => Math.random() - 0.5);

            let measureNotes = [];
            measureItems.forEach(item => measureNotes.push(...item.data.create()));

            const beams = Beam.generateBeams(measureNotes, { stem_direction: 1 });
            Formatter.FormatAndDraw(context, stave, measureNotes);
            beams.forEach(b => b.setContext(context).draw());
            
            x += measureWidth;
        }

        // MAGIA RESPONSIVE: Le decimos al SVG que ocupe el 100% del contenedor padre 
        // escalando dinámicamente según el tamaño de la pantalla
        const svgElement = container.querySelector("svg");
        if (svgElement) {
            svgElement.setAttribute("viewBox", `0 0 ${totalWidth} ${totalHeight}`);
            svgElement.style.width = "100%";
            svgElement.style.height = "auto";
        }
    }

    // --- MOTOR DE MINIJUEGOS ARCADE 8-BIT ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false; 
    let animationId;
    let currentGame = null;
    let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, ' ': false };
    let gameIsWon = false;
    
    window.addEventListener('keydown', e => { if (keys.hasOwnProperty(e.key)) { keys[e.key] = true; } });
    window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key)) { keys[e.key] = false; } });
    
    function pressKey(k) { keys[k] = true; if(event) event.preventDefault(); }
    function releaseKey(k) { keys[k] = false; if(event) event.preventDefault(); }

    function drawPixelNote(x, y) {
        ctx.fillStyle = "#000";
        ctx.fillRect(x+8, y+2, 4, 16);
        ctx.fillRect(x+2, y+12, 10, 8);
        ctx.fillRect(x, y+14, 2, 4);
        ctx.fillRect(x+12, y+14, 2, 4);
    }

    const games = {
        snake: {
            title: "🐍 Snake Rítmico",
            init: function() {
                this.grid = 15;
                this.snake = [{x: 10, y: 10}];
                this.dx = 0; this.dy = 0;
                this.food = {x: 5, y: 5};
                this.score = 0; this.target = 5;
                this.frameCount = 0;
            },
            update: function() {
                if (keys.ArrowLeft && this.dx === 0) { this.dx = -1; this.dy = 0; }
                if (keys.ArrowRight && this.dx === 0) { this.dx = 1; this.dy = 0; }
                if (keys.ArrowUp && this.dy === 0) { this.dx = 0; this.dy = -1; }
                if (keys.ArrowDown && this.dy === 0) { this.dx = 0; this.dy = 1; }

                if (++this.frameCount < 8) return; 
                this.frameCount = 0;

                const head = { x: this.snake[0].x + this.dx, y: this.snake[0].y + this.dy };
                if(head.x < 0) head.x = 19; if(head.x >= 20) head.x = 0;
                if(head.y < 0) head.y = 19; if(head.y >= 20) head.y = 0;
                
                this.snake.unshift(head);
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score++;
                    this.food = { x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20) };
                    if (this.score >= this.target) gameWon();
                } else {
                    this.snake.pop();
                }
            },
            draw: function() {
                ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0, 300, 300);
                ctx.fillStyle = "#43B047";
                this.snake.forEach((p, i) => {
                    ctx.fillRect(p.x * this.grid, p.y * this.grid, this.grid-1, this.grid-1);
                    if (i === 0) {
                        // Detalles para la cabeza de la serpiente
                        ctx.fillStyle = "#000";
                        ctx.fillRect(p.x * this.grid + 3, p.y * this.grid + 3, 3, 3);
                        ctx.fillRect(p.x * this.grid + 9, p.y * this.grid + 3, 3, 3);
                        ctx.fillStyle = "#43B047";
                    }
                });
                
                // Dibujar la comida como una "Nota"
                drawPixelNote(this.food.x * this.grid, this.food.y * this.grid);
                
                // Dibujar puntuación
                ctx.fillStyle = "#000";
                ctx.font = "10px 'Press Start 2P', sans-serif";
                ctx.fillText(`Notas: ${this.score}/${this.target}`, 10, 20);
            }
        }
    };

    // --- FUNCIONES DEL BUCLE ARCADE ---
    function iniciarArcade() {
        document.getElementById('pausa-activa-modal').style.display = 'flex';
        document.getElementById('arcade-controls').style.display = 'flex';
        document.getElementById('btn-cerrar-pausa').style.display = 'none';
        gameIsWon = false;
        
        // Asignamos Snake como el juego activo
        currentGame = games.snake;
        document.getElementById('arcade-title').innerText = currentGame.title;
        currentGame.init();
        
        if(animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameLoop() {
        if (gameIsWon) return;
        currentGame.update();
        currentGame.draw();
        animationId = requestAnimationFrame(gameLoop);
    }

    function gameWon() {
        gameIsWon = true;
        
        // Efecto de pantalla oscura
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Texto de victoria
        ctx.fillStyle = "#FBD000";
        ctx.font = "16px 'Press Start 2P', sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("¡SUPERADO!", canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "left"; // Restaurar alineación
        
        playLevelUpSound();
        
        // Mostrar botón de volver y ocultar controles arcade
        document.getElementById('arcade-controls').style.display = 'none';
        document.getElementById('btn-cerrar-pausa').style.display = 'block';
    }

    function cerrarArcade() {
        document.getElementById('pausa-activa-modal').style.display = 'none';
        
        // Comprobar si se ha alcanzado la meta de monedas después del minijuego
        if (coins >= GOAL_COINS) {
            setTimeout(triggerLevelUp, 300);
        } else {
            generateExercise();
        }
    }
</script>
